name: PRBar

options:
  bundleIdPrefix: dev.lustefaniak
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_WARN_DOCUMENTATION_COMMENTS: NO

targets:
  PRBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/PRBar
      - path: Resources/schemas
        buildPhase: resources
        type: folder
      - path: Resources/prompts
        buildPhase: resources
        type: folder
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: MarkdownUI
      - package: Sparkle
    # Custom Info.plist — Sparkle keys (SUFeedURL / SUPublicEDKey / SUEnableInstallerLauncherService)
    # are not in Apple's INFOPLIST_KEY_* allow-list, so GENERATE_INFOPLIST_FILE silently drops them.
    # Generating a real plist via XcodeGen is the only way to embed them.
    info:
      path: Resources/PRBar-Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        CFBundleDisplayName: PRBar
        CFBundleName: $(PRODUCT_NAME)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        NSHumanReadableCopyright: "Copyright Lukasz Stefaniak"
        # Sparkle auto-update. Feed lives on the gh-pages branch
        # (published by .github/workflows/release.yml on each tag).
        # The public EdDSA key is generated once via `bin/sparkle-keygen`
        # — the matching private key stays in the macOS Keychain
        # locally and in the SPARKLE_ED_PRIVATE_KEY GitHub secret on CI.
        SUFeedURL: "https://lustefaniak.github.io/prbar/appcast.xml"
        SUPublicEDKey: "K1o93vv5SuisDDP+LIRbLJddFf3PXpa3JoiKTnl2Jh4="
        SUEnableInstallerLauncherService: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lustefaniak.prbar
        PRODUCT_NAME: PRBar
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PRBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PRBarTests
    dependencies:
      - target: PRBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lustefaniak.prbar.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PRBar:
    build:
      targets:
        PRBar: all
        PRBarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - PRBarTests
    profile:
      config: Release
    archive:
      config: Release
