name: PRBar

options:
  bundleIdPrefix: dev.lustefaniak
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_WARN_DOCUMENTATION_COMMENTS: NO

targets:
  PRBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/PRBar
      - path: Resources/schemas
        buildPhase: resources
        type: folder
      - path: Resources/prompts
        buildPhase: resources
        type: folder
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: MarkdownUI
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lustefaniak.prbar
        PRODUCT_NAME: PRBar
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_CFBundleDisplayName: PRBar
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright Lukasz Stefaniak"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Sparkle auto-update. Feed lives on the gh-pages branch
        # (published by .github/workflows/release.yml on each tag).
        # The public EdDSA key is generated once via `bin/sparkle-keygen`
        # — the matching private key stays in the macOS Keychain
        # locally and in the SPARKLE_ED_PRIVATE_KEY GitHub secret on CI.
        # Replace the placeholder below the first time you run keygen.
        INFOPLIST_KEY_SUFeedURL: "https://lustefaniak.github.io/prbar/appcast.xml"
        INFOPLIST_KEY_SUPublicEDKey: "K1o93vv5SuisDDP+LIRbLJddFf3PXpa3JoiKTnl2Jh4="
        INFOPLIST_KEY_SUEnableInstallerLauncherService: NO

  PRBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PRBarTests
    dependencies:
      - target: PRBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lustefaniak.prbar.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PRBar:
    build:
      targets:
        PRBar: all
        PRBarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - PRBarTests
    profile:
      config: Release
    archive:
      config: Release
