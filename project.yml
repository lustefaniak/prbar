name: PRBar

options:
  bundleIdPrefix: dev.lustefaniak
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_WARN_DOCUMENTATION_COMMENTS: NO

targets:
  PRBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/PRBar
    resources:
      - path: Resources
        optional: true
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lustefaniak.prbar
        PRODUCT_NAME: PRBar
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_CFBundleDisplayName: PRBar
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright Lukasz Stefaniak"

  PRBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PRBarTests
    dependencies:
      - target: PRBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lustefaniak.prbar.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PRBar:
    build:
      targets:
        PRBar: all
        PRBarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - PRBarTests
    profile:
      config: Release
    archive:
      config: Release
