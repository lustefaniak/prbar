name: release

on:
  # Tag push of the form v0.1.0 cuts a real GitHub Release.
  push:
    tags:
      - "v*.*.*"
  # Manual dispatch produces a DMG artifact only — useful for one-off
  # builds without minting a tag.
  workflow_dispatch:

permissions:
  contents: write   # for softprops/action-gh-release on tag pushes

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # bin/version uses `git describe` + `git rev-list --count HEAD`
          # for the marketing/build numbers — the default shallow clone
          # would cap the commit count at 1.
          fetch-depth: 0

      - name: Select Xcode
        # Pin to a specific Xcode so build hashes stay reproducible.
        # Bump explicitly when we want a newer Xcode.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Install build tools
        run: brew install xcodegen create-dmg

      - name: Import Developer ID certificate into temporary keychain
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Standard Apple-recommended ephemeral-keychain recipe. The
          # keychain lives in $RUNNER_TEMP and dies with the runner.
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert \
            -f pkcs12 -k "$KEYCHAIN_PATH"
          # Without this, codesign prompts interactively for keychain
          # access on every signature — fatal on a headless runner.
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Add to the search list so codesign / xcodebuild see it.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            "$(security default-keychain -d user | tr -d '" ')"
          rm -f "$CERT_PATH"

      - name: Decode notary API key
        env:
          APPSTORE_API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/notary-key.p8"
          echo "$APPSTORE_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "NOTARY_API_KEY_PATH=$KEY_PATH" >>"$GITHUB_ENV"

      - name: Build, sign, notarize, staple universal DMG
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          # NOTARY_API_KEY_PATH is exported above.
        run: ./bin/release-dmg

      - name: Locate built DMG
        id: artifact
        run: |
          DMG_PATH="$(ls -1 build/release/PRBar-*.dmg | head -n1)"
          echo "path=$DMG_PATH" >>"$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG_PATH")" >>"$GITHUB_OUTPUT"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Sign DMG for Sparkle and build appcast
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          DMG: ${{ steps.artifact.outputs.path }}
        run: |
          if [[ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]]; then
            echo "::warning::SPARKLE_ED_PRIVATE_KEY secret missing — skipping appcast publish."
            echo "skip_appcast=1" >>"$GITHUB_ENV"
            exit 0
          fi
          # Pull existing appcast.xml from gh-pages so we preserve prior
          # release entries. The branch is bootstrapped with an empty
          # appcast at repo setup; gh-pages serves it at
          # https://lustefaniak.github.io/prbar/appcast.xml .
          mkdir -p build/release
          git fetch origin gh-pages --depth=1
          git show origin/gh-pages:appcast.xml >build/release/appcast.xml 2>/dev/null || true
          DMG="$DMG" ./bin/sparkle-appcast-add

      - name: Publish appcast to gh-pages
        if: startsWith(github.ref, 'refs/tags/v') && env.skip_appcast != '1'
        run: |
          # Publish to the existing gh-pages branch via a worktree so we
          # don't disturb main. We preserve `index.html` (and any other
          # files at the branch root) by checking out the branch instead
          # of starting from an orphan tree.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf build/ghpages
          git worktree add build/ghpages gh-pages
          cp build/release/appcast.xml build/ghpages/appcast.xml
          (cd build/ghpages && \
            git add appcast.xml && \
            (git diff --cached --quiet || \
              (git commit -m "release: appcast for ${GITHUB_REF_NAME}" && \
               git push origin gh-pages)))

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          body: |
            Universal (arm64 + x86_64), Developer ID signed and notarized by Apple.

            Drag PRBar.app into /Applications. No Gatekeeper prompt on first launch.

            Auto-update: PRBar checks the [appcast feed](https://lustefaniak.github.io/prbar/appcast.xml) on launch via Sparkle.
          fail_on_unmatched_files: true
