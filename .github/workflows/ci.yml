name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-flight CI run for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # bin/version uses git describe + rev-list count; the shallow
          # clone GitHub uses by default would skew the build number.
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build (Debug)
        run: ./bin/build

      - name: Test
        run: ./bin/test
